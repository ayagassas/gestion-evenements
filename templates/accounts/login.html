{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<h1>🔐 Connexion</h1>
<form method="post" class="app-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Se connecter</button>
    <p style="margin-top:1rem;">Pas encore de compte ? <a href="{% url 'accounts:register' %}">Créer un compte</a></p>
</form>
{% endblock %}
